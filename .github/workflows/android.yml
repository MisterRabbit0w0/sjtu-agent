name: Android CI

on:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'android/**'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -e . || true

      - name: Run Python tests
        run: python -m pytest tests/ -v

  test-android:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    needs: test-python
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Override Maven repos for CI
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/ci-repos.gradle.kts <<'EOF'
          beforeSettings {
              pluginManagement {
                  repositories.clear()
                  repositories {
                      mavenCentral()
                      google()
                      gradlePluginPortal()
                  }
              }
              dependencyResolutionManagement {
                  repositories.clear()
                  repositories {
                      mavenCentral()
                      google()
                  }
              }
          }
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --init-script ~/.gradle/init.d/ci-repos.gradle.kts

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test-android
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Override Maven repos for CI
        run: |
          mkdir -p ~/.gradle/init.d
          cat > ~/.gradle/init.d/ci-repos.gradle.kts <<'EOF'
          beforeSettings {
              pluginManagement {
                  repositories.clear()
                  repositories {
                      mavenCentral()
                      google()
                      gradlePluginPortal()
                  }
              }
              dependencyResolutionManagement {
                  repositories.clear()
                  repositories {
                      mavenCentral()
                      google()
                  }
              }
          }
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --init-script ~/.gradle/init.d/ci-repos.gradle.kts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sjtu-agent-debug
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
